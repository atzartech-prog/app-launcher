<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Launcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-content">
                <div class="header-left">
                    <img id="logo" class="logo" src="" alt="Logo">
                    <h1 id="headerTitle">App Launcher</h1>
                </div>
                <div class="header-right">
                    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Cari aplikasi...">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div id="appsContainer" class="apps-container"></div>
        </main>

        <!-- Footer -->
        <footer class="footer" id="footer">
            <p id="footerText">© 2024 App Launcher. All rights reserved.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
